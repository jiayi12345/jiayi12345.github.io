<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的小星球</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lovepink: '#ff7b9c',
                        lovedark: '#22182c'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes heartbeat {
            0%,100%{transform: scale(1)}
            50%{transform: scale(1.08)}
        }
        .heart{
            animation: heartbeat 1.8s infinite ease-in-out;
        }
        body{
            background: linear-gradient(135deg, #2c1f3b, #402847);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center text-white px-4 py-10">
    <div class="text-center max-w-xl">
        <h1 class="text-3xl md:text-4xl mb-4">
            <i class="fa fa-heart text-lovepink heart"></i>
            我们在一起
            <i class="fa fa-heart text-lovepink heart"></i>
        </h1>
        <p class="text-lg opacity-80 mb-8">始于 2026年04月05日</p>

        <div class="bg-white/10 rounded-2xl p-6 backdrop-blur-sm shadow-xl">
            <div id="time-box" class="text-2xl md:text-3xl font-medium leading-relaxed">
                加载中...
            </div>
        </div>

        <div class="mt-10 space-y-3 opacity-90">
            <p>故事还在继续，岁岁年年✨</p>
            <p class="text-sm">想和你走过无数个朝夕</p>
        </div>
    </div>

<script>
// ==========【这里可以修改】恋爱起始时间 ==========
const startDate = new Date("2026-04-05 00:00:00");
// ===============================================

function updateTime(){
    const now = new Date();
    const diff = now - startDate;

    const day = Math.floor(diff / (1000*60*60*24));
    const hour = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const min = Math.floor((diff % (1000*60*60)) / (1000*60));
    const sec = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById("time-box").innerHTML =
        `${day} 天 ${hour} 时 ${min} 分 ${sec} 秒`;
}
updateTime();
setInterval(updateTime,1000);
</script>
</body>
</html>
